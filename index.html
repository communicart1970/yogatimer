<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoga-Timer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene">
    <div class="orb"></div>
  </div>

  <main class="card">
    <div class="phase-label" id="phaseLabel">Übung</div>
    <div class="time" id="timeDisplay">01:00</div>

    <div class="controls">
      <button id="startBtn" class="btn primary">Start</button>
      <button id="pauseBtn" class="btn" disabled>Pause</button>
      <button id="resetBtn" class="btn">Reset</button>
    </div>

    <div class="settings">
      <label>
        Übung (Sek.)
        <input type="number" id="exerciseInput" min="5" max="600" value="60">
      </label>
      <label>
        Pause (Sek.)
        <input type="number" id="pauseInput" min="5" max="300" value="30">
      </label>
      <label>
        Wiederholungen
        <input type="number" id="repsInput" min="1" max="50" value="15">
      </label>
    </div>

    <div class="stats">
      Wiederholung <span id="repCount">0</span> / <span id="repTotal">15</span>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
