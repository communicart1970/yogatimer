<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fokus-Timer mit Vibe</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene">
    <div class="orb"></div>
  </div>

  <main class="card">
    <div class="phase-label" id="phaseLabel">Fokus</div>
    <div class="time" id="timeDisplay">25:00</div>

    <div class="controls">
      <button id="startBtn" class="btn primary">Start</button>
      <button id="pauseBtn" class="btn" disabled>Pause</button>
      <button id="resetBtn" class="btn">Reset</button>
    </div>

    <div class="settings">
      <label>
        Fokus
        <input type="number" id="workInput" min="1" max="90" value="25">
      </label>
      <label>
        Pause
        <input type="number" id="breakInput" min="1" max="30" value="5">
      </label>
    </div>

    <div class="stats">
      <span id="sessionCount">0</span> Fokus-Runden heute
    </div>
  </main>

  <audio id="dingSound" preload="auto">
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav">
  </audio>

  <script src="script.js"></script>
</body>
</html>
